<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LegPose — 腿部姿态估计</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#000;--surface:#1c1c1e;--surface2:#2c2c2e;--border:#38383a;
  --text:#f5f5f7;--text2:#a1a1a6;--accent:#0a84ff;--accent-hover:#409cff;
  --green:#30d158;--red:#ff453a;--yellow:#ffd60a;
  --radius:16px;--radius-sm:10px;
  --transition:0.3s cubic-bezier(.25,.1,.25,1);
}
html{font-size:16px;-webkit-text-size-adjust:100%}
body{
  font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Helvetica Neue",Arial,sans-serif;
  background:var(--bg);color:var(--text);line-height:1.5;min-height:100vh;
  -webkit-font-smoothing:antialiased;overflow-x:hidden;
}

/* ===== Nav ===== */
.nav{
  position:fixed;top:0;left:0;right:0;z-index:100;
  background:rgba(0,0,0,.72);backdrop-filter:saturate(180%) blur(20px);
  -webkit-backdrop-filter:saturate(180%) blur(20px);
  border-bottom:.5px solid var(--border);height:52px;
  display:flex;align-items:center;justify-content:center;padding:0 16px;
}
.nav-inner{max-width:1200px;width:100%;display:flex;align-items:center;justify-content:space-between}
.nav-brand{font-size:17px;font-weight:600;letter-spacing:-.02em;background:linear-gradient(135deg,#0a84ff,#5e5ce6,#bf5af2);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.nav-links{display:flex;gap:16px;align-items:center}
.nav-links a{color:var(--text2);text-decoration:none;font-size:14px;transition:color var(--transition)}
.nav-links a:hover{color:var(--text)}
.gh-link{display:flex;align-items:center;gap:6px;padding:6px 14px;border-radius:20px;border:.5px solid var(--border);transition:all var(--transition)}
.gh-link:hover{border-color:var(--text2);background:var(--surface)}
.gh-link svg{width:16px;height:16px;fill:var(--text2)}
.nav-text-link{display:inline}

/* ===== Player ===== */
.player-section{margin-top:52px;max-width:1200px;margin-left:auto;margin-right:auto;padding:16px 16px 0}
.player-wrapper{
  position:relative;width:100%;aspect-ratio:16/9;
  background:#0a0a0a;border-radius:var(--radius);overflow:hidden;
  border:.5px solid var(--border);
}
.player-wrapper canvas{width:100%;height:100%;object-fit:contain;display:block}
.player-wrapper img.result-img{width:100%;height:100%;object-fit:contain;display:none}

/* Overlays */
.player-badge{
  position:absolute;top:12px;left:12px;
  background:rgba(255,0,0,.88);color:#fff;font-size:10px;font-weight:600;
  padding:4px 10px;border-radius:6px;display:none;align-items:center;gap:5px;
  text-transform:uppercase;letter-spacing:.05em;z-index:2;
}
.player-badge.active{display:flex}
.player-badge::before{content:'';width:6px;height:6px;border-radius:50%;background:#fff;animation:blink 1s ease infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}

.player-frame-info{
  position:absolute;top:12px;right:12px;
  background:rgba(0,0,0,.65);color:var(--text2);font-size:11px;
  padding:3px 8px;border-radius:6px;font-variant-numeric:tabular-nums;z-index:2;
  display:none;max-width:50%;text-align:right;
}
.player-frame-info.active{display:block}

.player-placeholder{
  position:absolute;inset:0;display:flex;flex-direction:column;
  align-items:center;justify-content:center;color:var(--text2);gap:10px;z-index:1;padding:16px;
}
.player-placeholder svg{width:48px;height:48px;stroke:#38383a;fill:none;stroke-width:1}
.player-placeholder p{font-size:14px;text-align:center}
.player-placeholder .hint{font-size:12px;color:#636366;text-align:center}

/* FPS counter */
.fps-badge{
  position:absolute;bottom:12px;left:12px;
  background:rgba(0,0,0,.65);color:var(--green);font-size:11px;
  padding:3px 8px;border-radius:6px;font-variant-numeric:tabular-nums;z-index:2;
  display:none;
}
.fps-badge.active{display:block}

/* ===== Controls bar ===== */
.controls-bar{
  display:none;align-items:center;gap:10px;
  background:var(--surface);padding:8px 12px;
  border-radius:0 0 var(--radius) var(--radius);
  border-top:.5px solid var(--border);margin-top:-1px;
}
.controls-bar.active{display:flex}
.ctrl-btn{
  width:34px;height:34px;border-radius:50%;background:var(--accent);border:none;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  transition:all var(--transition);flex-shrink:0;
}
.ctrl-btn:hover{background:var(--accent-hover);transform:scale(1.05)}
.ctrl-btn svg{width:14px;height:14px;fill:#fff}
.ctrl-slider{
  flex:1;height:4px;-webkit-appearance:none;appearance:none;
  background:var(--border);border-radius:2px;outline:none;cursor:pointer;min-width:0;
}
.ctrl-slider::-webkit-slider-thumb{-webkit-appearance:none;width:14px;height:14px;background:#fff;border-radius:50%}
.ctrl-time{font-size:12px;color:var(--text2);font-variant-numeric:tabular-nums;white-space:nowrap}

/* ===== Below player ===== */
.below-player{max-width:1200px;margin:0 auto;padding:16px;display:grid;grid-template-columns:1fr 1fr;gap:16px}

/* ===== Card ===== */
.card{background:var(--surface);border-radius:var(--radius);border:.5px solid var(--border);overflow:hidden;transition:border-color var(--transition)}
.card:hover{border-color:#48484a}
.card-header{padding:16px 20px 0;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.card-title{font-size:15px;font-weight:600;display:flex;align-items:center;gap:8px}
.card-title .dot{width:8px;height:8px;border-radius:50%;background:var(--green);box-shadow:0 0 6px var(--green)}
.card-body{padding:16px 20px 20px}

/* ===== Mode tabs ===== */
.mode-tabs{display:flex;gap:0;background:var(--surface2);border-radius:var(--radius-sm);padding:3px;margin-bottom:16px}
.mode-tab{
  flex:1;padding:8px 0;text-align:center;font-size:13px;font-weight:500;
  color:var(--text2);border-radius:8px;cursor:pointer;transition:all var(--transition);
  border:none;background:none;
}
.mode-tab.active{background:var(--accent);color:#fff}
.mode-tab:not(.active):hover{color:var(--text)}

/* ===== Upload Zone ===== */
.upload-zone{
  border:1.5px dashed var(--border);border-radius:var(--radius-sm);
  padding:28px 16px;text-align:center;cursor:pointer;transition:all var(--transition);
}
.upload-zone:hover,.upload-zone.dragover{border-color:var(--accent);background:rgba(10,132,255,.06)}
.upload-zone input{display:none}
.upload-icon{width:40px;height:40px;margin:0 auto 12px;border-radius:50%;background:var(--surface2);display:flex;align-items:center;justify-content:center;transition:transform var(--transition)}
.upload-zone:hover .upload-icon{transform:scale(1.05)}
.upload-icon svg{width:20px;height:20px;stroke:var(--accent);fill:none;stroke-width:1.5}
.upload-text{font-size:13px;color:var(--text2)}
.upload-text strong{color:var(--accent);font-weight:500}
.upload-hint{font-size:11px;color:#636366;margin-top:4px}

/* ===== Webcam panel ===== */
.cam-panel{display:none;text-align:center}
.cam-panel.active{display:block}
.cam-preview{width:100%;aspect-ratio:4/3;background:#0a0a0a;border-radius:var(--radius-sm);overflow:hidden;position:relative;margin-bottom:12px}
.cam-preview video{width:100%;height:100%;object-fit:cover}
.cam-status{position:absolute;bottom:8px;left:8px;background:rgba(0,0,0,.65);color:var(--text2);font-size:11px;padding:3px 8px;border-radius:6px}
.cam-controls{display:flex;gap:8px;justify-content:center}
.cam-btn{
  padding:10px 20px;border-radius:980px;font-size:13px;font-weight:500;
  border:none;cursor:pointer;transition:all var(--transition);
  display:inline-flex;align-items:center;gap:6px;
}
.cam-btn-start{background:var(--green);color:#000}
.cam-btn-start:hover{background:#3de070}
.cam-btn-stop{background:var(--red);color:#fff}
.cam-btn-stop:hover{background:#ff6961}
.cam-btn:disabled{background:var(--surface2);color:#636366;cursor:not-allowed}

/* ===== File Info ===== */
.file-info{display:none;background:var(--surface2);border-radius:var(--radius-sm);padding:12px;margin-top:12px}
.file-info.active{display:flex;align-items:center;gap:10px}
.file-thumb{width:44px;height:44px;border-radius:8px;background:var(--surface);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0}
.file-thumb img{width:100%;height:100%;object-fit:cover}
.file-thumb svg{width:20px;height:20px;stroke:var(--text2);fill:none;stroke-width:1.5}
.file-meta{flex:1;min-width:0}
.file-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.file-size{font-size:11px;color:var(--text2);margin-top:1px}
.file-remove{width:26px;height:26px;border-radius:50%;background:none;border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;color:var(--text2);font-size:16px;transition:all var(--transition)}
.file-remove:hover{background:var(--surface);color:var(--red)}

/* ===== Button ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:10px 20px;border-radius:980px;font-size:14px;font-weight:500;border:none;cursor:pointer;transition:all var(--transition);margin-top:12px;width:100%}
.btn-primary{background:var(--accent);color:#fff}
.btn-primary:hover{background:var(--accent-hover)}
.btn-primary:disabled{background:var(--surface2);color:#636366;cursor:not-allowed}
.spinner{width:16px;height:16px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;display:none}
@keyframes spin{to{transform:rotate(360deg)}}

/* ===== Progress ===== */
.progress-wrap{display:none;margin-top:12px}
.progress-wrap.active{display:block}
.progress-bar{height:3px;background:var(--surface2);border-radius:2px;overflow:hidden}
.progress-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--accent),#5e5ce6);border-radius:2px;transition:width .3s ease}
.progress-text{display:flex;justify-content:space-between;font-size:11px;color:var(--text2);margin-top:4px}
.progress-pct{color:var(--accent);font-weight:500}

/* ===== Stats ===== */
.result-stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px}
.stat{background:var(--surface2);border-radius:var(--radius-sm);padding:10px;text-align:center}
.stat-value{font-size:18px;font-weight:600;color:var(--accent)}
.stat-label{font-size:10px;color:var(--text2);margin-top:2px}

/* ===== Output list ===== */
.output-item{display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:.5px solid var(--border)}
.output-item:last-child{border-bottom:none}
.output-icon{width:36px;height:36px;border-radius:8px;background:var(--surface2);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.output-icon svg{width:16px;height:16px;stroke:var(--accent);fill:none;stroke-width:1.5}
.output-meta{flex:1;min-width:0}
.output-name{font-size:13px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;color:var(--text);transition:color var(--transition)}
.output-name:hover{color:var(--accent)}
.output-size{font-size:11px;color:var(--text2);margin-top:1px}
.output-actions{display:flex;gap:4px}
.out-btn{width:30px;height:30px;border-radius:8px;background:var(--surface2);border:none;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--transition)}
.out-btn:hover{background:var(--border)}
.out-btn svg{width:14px;height:14px;stroke:var(--text2);fill:none;stroke-width:1.5}
.out-btn.del:hover svg{stroke:var(--red)}
.empty-state{text-align:center;padding:28px 12px;color:var(--text2);font-size:13px}
.empty-state svg{width:32px;height:32px;stroke:#48484a;fill:none;stroke-width:1;margin-bottom:8px}

.output-header-actions{display:flex;gap:8px;align-items:center}
.open-folder-btn{
  display:none;align-items:center;gap:5px;padding:5px 12px;border-radius:8px;
  background:var(--surface2);border:.5px solid var(--border);cursor:pointer;
  color:var(--text2);font-size:12px;transition:all var(--transition);
}
.open-folder-btn:hover{border-color:var(--text2);color:var(--text);background:var(--border)}
.open-folder-btn svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:1.5}
.open-folder-btn.visible{display:inline-flex}

/* ===== Footer ===== */
.footer{text-align:center;padding:24px 16px;color:#48484a;font-size:12px;border-top:.5px solid var(--border)}
.footer a{color:var(--text2);text-decoration:none}
.footer a:hover{color:var(--accent)}

/* ===== Toast ===== */
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%) translateY(100px);background:var(--surface);border:.5px solid var(--border);padding:10px 20px;border-radius:12px;font-size:13px;color:var(--text);box-shadow:0 8px 32px rgba(0,0,0,.4);transition:transform .4s cubic-bezier(.25,.1,.25,1);z-index:200;max-width:calc(100vw - 32px);text-align:center}
.toast.show{transform:translateX(-50%) translateY(0)}
.toast.error{border-color:var(--red)}

/* ===== Animations ===== */
@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
.fade-up{animation:fadeUp .6s ease forwards}
.fade-up-d1{animation-delay:.1s;opacity:0}
.fade-up-d2{animation-delay:.2s;opacity:0}

/* ===== Mobile ===== */
@media(max-width:860px){
  .below-player{grid-template-columns:1fr;gap:12px}
  .nav-text-link{display:none}
}
@media(max-width:480px){
  .nav{height:48px;padding:0 12px}
  .nav-brand{font-size:15px}
  .gh-link{padding:5px 10px;font-size:12px}
  .gh-link svg{width:14px;height:14px}
  .player-section{margin-top:48px;padding:10px 10px 0}
  .below-player{padding:10px}
  .card-header{padding:12px 14px 0}
  .card-body{padding:12px 14px 14px}
  .player-placeholder svg{width:40px;height:40px}
  .player-placeholder p{font-size:13px}
  .stat-value{font-size:16px}
  .mode-tab{font-size:12px;padding:7px 0}
  .upload-zone{padding:20px 12px}
}
</style>
</head>

<nav class="nav">

    <div class="nav-brand">LegPose</div>

<!-- Player -->
<section class="player-section">
  <div class="player-wrapper" id="playerWrapper">
    <canvas id="previewCanvas"></canvas>
    <img class="result-img" id="resultImg">

    <div class="player-badge" id="playerBadge">LIVE</div>
    <div class="player-frame-info" id="playerFrameInfo">—</div>
    <div class="fps-badge" id="fpsBadge">— fps</div>

    <div class="player-placeholder" id="playerPlaceholder">
      <svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2M9 9h.01M15 9h.01" stroke-linecap="round"/></svg>
      <p>上传文件或开启摄像头</p>
      <span class="hint">腿部关键点将实时显示在这里</span>
    </div>
  </div>

  <!-- Video controls -->
  <div class="controls-bar" id="controlsBar">
    <button class="ctrl-btn" id="playBtn" aria-label="播放/暂停">
      <svg id="playIcon" viewBox="0 0 24 24"><polygon points="5,3 19,12 5,21"/></svg>
      <svg id="pauseIcon" viewBox="0 0 24 24" style="display:none"><rect x="5" y="3" width="4" height="18"/><rect x="15" y="3" width="4" height="18"/></svg>
    </button>
    <input type="range" class="ctrl-slider" id="seekBar" min="0" max="100" value="0">
    <span class="ctrl-time" id="timeDisplay">0:00 / 0:00</span>
  </div>
</section>

<!-- Below player -->
<div class="below-player">

  <!-- Left: Upload / Webcam / Controls -->
  <div class="fade-up fade-up-d1">
    <div class="card">
      <div class="card-header">
        <div class="card-title">
          <span class="dot" id="statusDot"></span>
          <span id="statusText">就绪</span>
        </div>
      </div>
      <div class="card-body">
        <!-- Mode tabs -->
        <div class="mode-tabs">
          <button class="mode-tab active" data-mode="upload" id="tabUpload">上传文件</button>
          <button class="mode-tab" data-mode="camera" id="tabCamera">摄像头</button>
        </div>

        <!-- Upload panel -->
        <div class="upload-panel" id="uploadPanel">
          <div class="upload-zone" id="dropZone">
            <input type="file" id="fileInput" accept="image/*,video/*">
            <div class="upload-icon">
              <svg viewBox="0 0 24 24"><path d="M12 16V4m0 0l-4 4m4-4l4 4M4 20h16" stroke-linecap="round" stroke-linejoin="round"/></svg>
            </div>
            <div class="upload-text">拖拽文件到此处，或 <strong>点击上传</strong></div>
            <div class="upload-hint">支持 JPG / PNG / BMP / MP4 / MOV / AVI</div>
          </div>

          <div class="file-info" id="fileInfo">
            <div class="file-thumb" id="fileThumb">
              <svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>
            </div>
            <div class="file-meta">
              <div class="file-name" id="fileName"></div>
              <div class="file-size" id="fileSize"></div>
            </div>
            <button class="file-remove" id="fileRemove" aria-label="移除">×</button>
          </div>

          <div class="progress-wrap" id="progressWrap">
            <div class="progress-bar"><div class="progress-fill" id="progressFill"></div></div>
            <div class="progress-text">
              <span id="progressLabel">等待开始...</span>
              <span class="progress-pct" id="progressPct">0%</span>
            </div>
          </div>

          <button class="btn btn-primary" id="startBtn" disabled>
            <span id="btnText">开始检测</span>
            <div class="spinner" id="btnSpinner"></div>
          </button>
        </div>

        <!-- Camera panel -->
        <div class="cam-panel" id="camPanel">
          <div class="cam-controls">
            <button class="cam-btn cam-btn-start" id="camStartBtn">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 7l-7 5 7 5V7z"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
              开启摄像头
            </button>
            <button class="cam-btn cam-btn-stop" id="camStopBtn" style="display:none">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="6" y="6" width="12" height="12" rx="1"/></svg>
              停止
            </button>
          </div>
        </div>

        <!-- Stats (shared) -->
        <div class="result-stats" id="resultStats" style="display:none">
          <div class="stat"><div class="stat-value" id="statPersons">-</div><div class="stat-label">检测人数</div></div>
          <div class="stat"><div class="stat-value" id="statKeypoints">-</div><div class="stat-label">关键点</div></div>
          <div class="stat"><div class="stat-value" id="statFrames">-</div><div class="stat-label">处理帧数</div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- Right: Output Files -->
  <div class="fade-up fade-up-d2">
    <div class="card" id="output-section">
      <div class="card-header">
        <div class="card-title">输出文件夹</div>

            <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2v1" stroke-linecap="round" stroke-linejoin="round"/><path d="M10 13l-2 2 2 2" stroke-linecap="round" stroke-linejoin="round"/><path d="M14 17h6" stroke-linecap="round"/></svg>
            打开目录
          </button>
          <button class="out-btn" id="refreshBtn" title="刷新">
            <svg viewBox="0 0 24 24"><path d="M1 4v6h6M23 20v-6h-6" stroke-linecap="round" stroke-linejoin="round"/><path d="M20.49 9A9 9 0 005.64 5.64L1 10m22 4l-4.64 4.36A9 9 0 013.51 15" stroke-linecap="round" stroke-linejoin="round"/></svg>
          </button>
        </div>
      </div>
      <div class="card-body">
        <div id="outputList"></div>
        <div class="empty-state" id="emptyOutputs" style="display:none;">
          <svg viewBox="0 0 24 24"><path d="M22 19a2 2 0 01-2 2H4a2 2 0 01-2-2V5a2 2 0 012-2h5l2 3h9a2 2 0 012 2z" stroke-linecap="round" stroke-linejoin="round"/></svg>
          <div>还没有输出文件</div>
        </div>
      </div>
    </div>
  </div>
</div>

<footer class="footer">
  <p>LegPose — 基于 <a href="https://github.com/Rensr0/openpose-leg" target="_blank">openpose-leg</a> 的腿部姿态估计工具</p>
</footer>

<div class="toast" id="toast"></div>

<script>
const $ = s => document.querySelector(s);
let selectedFile = null;
let isLocalhost = false;
let currentMode = 'upload';

// ===== Init =====
(function detectLocalhost() {
  const h = window.location.hostname;
  isLocalhost = (h === '127.0.0.1' || h === 'localhost' || h === '::1');
  if (isLocalhost) $('#openFolderBtn').classList.add('visible');
})();

function toast(msg, err = false) {
  const t = $('#toast'); t.textContent = msg;
  t.className = 'toast show' + (err ? ' error' : '');
  setTimeout(() => t.className = 'toast', 3000);
}

// ===== Mode tabs =====
$('#tabUpload').addEventListener('click', () => switchMode('upload'));
$('#tabCamera').addEventListener('click', () => switchMode('camera'));

function switchMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.mode-tab').forEach(t => t.classList.toggle('active', t.dataset.mode === mode));
  $('#uploadPanel').style.display = mode === 'upload' ? 'block' : 'none';
  $('#camPanel').className = mode === 'camera' ? 'cam-panel active' : 'cam-panel';
  if (mode === 'upload') stopCamera();
}

// Camera button handlers
$('#camStartBtn').addEventListener('click', startCamera);
$('#camStopBtn').addEventListener('click', stopCamera);

// ===== Upload =====
const dropZone = $('#dropZone'), fileInput = $('#fileInput');
dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); if (e.dataTransfer.files.length) selectFile(e.dataTransfer.files[0]); });
dropZone.addEventListener('click', () => fileInput.click());
fileInput.addEventListener('change', () => { if (fileInput.files.length) selectFile(fileInput.files[0]); });
$('#fileRemove').addEventListener('click', clearFile);

function selectFile(file) {
  selectedFile = file;
  $('#fileName').textContent = file.name;
  $('#fileSize').textContent = fmtSize(file.size);
  $('#fileInfo').classList.add('active');
  $('#startBtn').disabled = false;
  if (file.type.startsWith('image/')) {
    const r = new FileReader();
    r.onload = e => { $('#fileThumb').innerHTML = `<img src="${e.target.result}">`; };
    r.readAsDataURL(file);
  } else {
    $('#fileThumb').innerHTML = '<svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>';
  }
}
function clearFile() { selectedFile = null; fileInput.value = ''; $('#fileInfo').classList.remove('active'); $('#startBtn').disabled = true; }
function fmtSize(b) { return b < 1024 ? b+' B' : b < 1048576 ? (b/1024).toFixed(1)+' KB' : (b/1048576).toFixed(1)+' MB'; }

// ===== Upload Processing (SSE) =====
$('#startBtn').addEventListener('click', startProcess);

function startProcess() {
  if (!selectedFile) return;
  $('#startBtn').disabled = true;
  $('#btnText').textContent = '处理中...';
  $('#btnSpinner').style.display = 'block';
  setStatus('processing', '正在处理');
  $('#progressWrap').classList.add('active');
  $('#progressFill').style.width = '0%';
  $('#progressPct').textContent = '0%';
  $('#progressLabel').textContent = '正在上传...';

  $('#playerPlaceholder').style.display = 'none';
  $('#resultImg').style.display = 'none';
  $('#controlsBar').classList.remove('active');
  $('#previewCanvas').style.display = 'block';
  $('#playerBadge').classList.add('active');
  $('#playerFrameInfo').classList.add('active');
  $('#playerFrameInfo').textContent = '...';
  $('#resultStats').style.display = 'none';

  const form = new FormData();
  form.append('file', selectedFile);

  fetch('/api/process', { method: 'POST', body: form })
    .then(resp => {
      const reader = resp.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';
      function read() {
        reader.read().then(({ done, value }) => {
          if (done) { finishUI(); return; }
          buf += decoder.decode(value, { stream: true });
          const lines = buf.split('\n');
          buf = lines.pop();
          for (const l of lines) {
            if (l.startsWith('data: ')) {
              try { handleEvent(JSON.parse(l.slice(6))); } catch(e) {}
            }
          }
          read();
        });
      }
      read();
    })
    .catch(err => { toast(err.message, true); finishUI(); });
}

function handleEvent(data) {
  if (data.type === 'progress') {
    $('#progressFill').style.width = data.pct + '%';
    $('#progressPct').textContent = data.pct + '%';
    $('#progressLabel').textContent = data.label;
  } else if (data.type === 'frame') {
    drawFrame(data.frame);
    $('#playerFrameInfo').textContent = `帧 ${data.frame_num} / ${data.total_frames}`;
  } else if (data.type === 'done') {
    setStatus('done', '完成');
    $('#progressFill').style.width = '100%';
    $('#progressPct').textContent = '100%';
    $('#progressLabel').textContent = '处理完成!';
    $('#previewCanvas').style.display = 'none';
    $('#playerBadge').classList.remove('active');
    $('#playerFrameInfo').classList.remove('active');
    showOutputFile(data.output, data.media_type, data);
    loadOutputs();
    toast('处理完成！');
    finishUI();
  }
}

function drawFrame(b64) {
  // createImageBitmap 比 new Image() 快：Worker 线程解码 JPEG，不阻塞 UI
  const raw = atob(b64);
  const arr = new Uint8Array(raw.length);
  for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
  createImageBitmap(new Blob([arr], { type: 'image/jpeg' })).then(bmp => {
    const canvas = $('#previewCanvas');
    canvas.width = bmp.width;
    canvas.height = bmp.height;
    canvas.getContext('2d').drawImage(bmp, 0, 0);
    bmp.close();
  }).catch(() => {});
}

// ===== Webcam =====
let camStream = null;
let camRunning = false;
let camDetectTimer = null;
let lastSkeletonB64 = null;
// Hidden video element for webcam (drawn to player canvas, not displayed directly)
const camVideo = document.createElement('video');
camVideo.autoplay = true; camVideo.playsInline = true; camVideo.muted = true;
const camCanvas = document.createElement('canvas');
const camCtx = camCanvas.getContext('2d', { willReadFrequently: true });

// 检测摄像头可用性
function checkCameraSupport() {
  if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
    const reason = location.protocol === 'https:'
      ? '浏览器不支持摄像头 API'
      : '摄像头需要 HTTPS，请用 https:// 访问或使用 localhost';
    $('#camStartBtn').disabled = true;
    toast(reason, true);
    return false;
  }
  return true;
}
// 页面加载时检查
setTimeout(checkCameraSupport, 100);

async function startCamera() {
  if (!checkCameraSupport()) return;
  try {
    const stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 320 }, height: { ideal: 240 } },
      audio: false
    });
    camStream = stream;
    camVideo.srcObject = stream;
    await camVideo.play();

    camRunning = true;
    $('#camStartBtn').style.display = 'none';
    $('#camStopBtn').style.display = 'inline-flex';
    setStatus('processing', '摄像头检测中');

    // 显示播放器
    $('#playerPlaceholder').style.display = 'none';
    $('#resultImg').style.display = 'none';
    $('#controlsBar').classList.remove('active');
    $('#previewCanvas').style.display = 'block';
    $('#playerBadge').classList.add('active');
    $('#playerFrameInfo').classList.remove('active');
    $('#fpsBadge').classList.add('active');
    $('#fpsBadge').textContent = '30 fps';
    $('#resultStats').style.display = 'none';

    lastSkeletonB64 = null;

    // 画面绘制循环（30fps，只画摄像头+叠加骨骼，不等服务端）
    drawCamLoop();
    // 检测循环（独立定时器，~8fps 发请求）
    camDetectTimer = setInterval(camDetectOnce, 120);
  } catch (e) {
    toast('无法访问摄像头: ' + e.message, true);
  }
}

function stopCamera() {
  camRunning = false;
  camDetectInFlight = false;  // 重置检测锁，防止残留请求干扰
  if (camDetectTimer) { clearInterval(camDetectTimer); camDetectTimer = null; }
  if (camStream) { camStream.getTracks().forEach(t => t.stop()); camStream = null; }
  camVideo.srcObject = null;
  lastSkeletonB64 = null;
  $('#camStartBtn').style.display = 'inline-flex';
  $('#camStopBtn').style.display = 'none';
  $('#playerBadge').classList.remove('active');
  $('#fpsBadge').classList.remove('active');
  $('#playerPlaceholder').style.display = 'flex';
  $('#previewCanvas').style.display = 'none';
  $('#resultStats').style.display = 'none';
  // 清空画布
  const canvas = $('#previewCanvas');
  canvas.getContext('2d').clearRect(0, 0, canvas.width, canvas.height);
  setStatus('done', '就绪');
}

// 独立绘制循环：显示最近一次检测结果（服务端返回的是完整帧：原画面+骨骼），限 30fps
function drawCamLoop() {
  if (!camRunning) return;
  const now = performance.now();
  const interval = 1000 / 30;
  if (now - (drawCamLoop._lastDraw || 0) < interval) {
    requestAnimationFrame(drawCamLoop);
    return;
  }
  drawCamLoop._lastDraw = now;

  if (lastSkeletonB64) {
    const raw = atob(lastSkeletonB64);
    const arr = new Uint8Array(raw.length);
    for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
    createImageBitmap(new Blob([arr], { type: 'image/jpeg' })).then(bmp => {
      const canvas = $('#previewCanvas');
      canvas.width = bmp.width;
      canvas.height = bmp.height;
      canvas.getContext('2d').drawImage(bmp, 0, 0);
      bmp.close();
    }).catch(() => {});
  }
  requestAnimationFrame(drawCamLoop);
}

// 独立检测循环：采帧 → 发请求 → 更新骨骼（请求中跳过，完成后立即发下一个）
let camDetectInFlight = false;
function camDetectOnce() {
  if (!camRunning || camDetectInFlight) return;
  const video = camVideo;
  if (video.readyState < 2) return;

  camDetectInFlight = true;
  const w = video.videoWidth;
  const h = video.videoHeight;
  camCanvas.width = w;
  camCanvas.height = h;
  camCtx.drawImage(video, 0, 0, w, h);
  const b64 = camCanvas.toDataURL('image/jpeg', 0.35).split(',')[1];

  fetch('/api/detect', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ frame: b64, quality: 30 })
  })
  .then(r => r.json())
  .then(data => {
    if (data.frame) {
      lastSkeletonB64 = data.frame;
      $('#statPersons').textContent = data.persons;
      $('#statKeypoints').textContent = data.keypoints;
      $('#statFrames').textContent = '实时';
      $('#resultStats').style.display = 'grid';
    }
  })
  .catch(() => {})
  .finally(() => {
    camDetectInFlight = false;
    // 请求完成后立即再采一帧，不等下一个 interval
    if (camRunning) camDetectOnce();
  });
}

// ===== Output preview in player =====

// 帧流播放器：流式逐帧接收，内存只保留 2-3 帧，播一帧丢一帧
const fp = {
  filename: null,
  fps: 25,
  totalFrames: 0,
  frameIndex: 0,      // 当前播放帧号
  playing: false,
  timer: null,
  // 流控制
  aborter: null,       // AbortController 用于中断 fetch
  reader: null,        // ReadableStream reader
  streamBuf: new Uint8Array(0),
  streamDone: false,
  // 帧队列（滚动缓冲，最多 4 帧）
  queue: [],           // ImageBitmap 数组
  maxQueue: 4,
  fetching: false,     // 是否正在从流中提取帧
};

function showOutputFile(filename, mediaType, extra) {
  stopVideoPlayback();
  if (camRunning) stopCamera();

  $('#playerPlaceholder').style.display = 'none';
  $('#previewCanvas').style.display = 'block';
  $('#playerBadge').classList.remove('active');
  $('#fpsBadge').classList.remove('active');
  $('#resultImg').style.display = 'none';

  if (!mediaType) {
    const ext = filename.split('.').pop().toLowerCase();
    mediaType = ['mp4','mov','avi','mkv','webm'].includes(ext) ? 'video' : 'image';
  }

  if (mediaType === 'image') {
    $('#previewCanvas').style.display = 'none';
    $('#resultImg').src = '/api/output/' + encodeURIComponent(filename);
    $('#resultImg').style.display = 'block';
    $('#controlsBar').classList.remove('active');
    $('#playerFrameInfo').classList.remove('active');
  } else {
    $('#controlsBar').classList.add('active');
    $('#playerFrameInfo').classList.add('active');
    $('#playerFrameInfo').textContent = '加载中...';
    startStream(filename, 0);
  }

  if (extra) {
    if (extra.media_type === 'image') {
      $('#statPersons').textContent = extra.persons || '-';
      $('#statKeypoints').textContent = extra.keypoints || '-';
      $('#statFrames').textContent = '—';
    } else {
      $('#statPersons').textContent = '—';
      $('#statKeypoints').textContent = '—';
      $('#statFrames').textContent = extra.processed_frames || '-';
    }
    $('#resultStats').style.display = 'grid';
  }
}

// ===== 流控制 =====
const SOI = new Uint8Array([0xFF, 0xD8]);
const EOI = new Uint8Array([0xFF, 0xD9]);

function concatBytes(a, b) {
  const c = new Uint8Array(a.length + b.length);
  c.set(a, 0); c.set(b, a.length);
  return c;
}

function findBytes(hay, needle, start) {
  for (let i = start; i <= hay.length - needle.length; i++) {
    let ok = true;
    for (let j = 0; j < needle.length; j++) { if (hay[i+j] !== needle[j]) { ok = false; break; } }
    if (ok) return i;
  }
  return -1;
}

// 启动帧流（可指定起始帧号用于 seek）
async function startStream(filename, startFrame) {
  // 清理旧流
  if (fp.aborter) fp.aborter.abort();
  fp.aborter = null;
  fp.reader = null;
  clearQueue();

  fp.filename = filename;
  fp.streamBuf = new Uint8Array(0);
  fp.streamDone = false;
  fp.fetching = false;
  fp.frameIndex = startFrame;
  fp.playing = false;
  if (fp.timer) { clearTimeout(fp.timer); fp.timer = null; }

  // 获取元信息
  if (!fp.totalFrames) {
    try {
      const meta = await fetch('/api/video-meta/' + encodeURIComponent(filename)).then(r => r.json());
      if (meta.error) { toast('获取视频信息失败', true); return; }
      fp.fps = meta.fps || 25;
      fp.totalFrames = meta.total_frames;
    } catch(e) { toast('获取视频信息失败', true); return; }
  }

  $('#playerFrameInfo').textContent = '缓冲中...';

  // 建立流连接
  fp.aborter = new AbortController();
  try {
    const url = '/api/video-stream/' + encodeURIComponent(filename) + (startFrame > 0 ? '?start=' + startFrame : '');
    const resp = await fetch(url, { signal: fp.aborter.signal });
    fp.reader = resp.body.getReader();
  } catch(e) {
    if (e.name !== 'AbortError') toast('连接失败', true);
    return;
  }

  // 开始填充队列
  fillQueue();
}

// 从流中读取数据，提取 JPEG 帧加入队列（只存字节，不解码）
async function fillQueue() {
  if (fp.fetching || !fp.reader) return;
  fp.fetching = true;

  try {
    let iterations = 0;
    const MAX_ITERATIONS = 200;

    while (iterations++ < MAX_ITERATIONS) {
      if (fp.queue.length >= fp.maxQueue) break;
      if (fp.streamDone && fp.streamBuf.length === 0) break;

      if (!fp.streamDone) {
        try {
          const { done, value } = await fp.reader.read();
          if (done) { fp.streamDone = true; }
          else { fp.streamBuf = concatBytes(fp.streamBuf, value); }
        } catch(e) {
          if (e.name !== 'AbortError') fp.streamDone = true;
          break;
        }
      }

      // 同步提取 JPEG 字节（不做 createImageBitmap，避免异步阻塞）
      let soi = findBytes(fp.streamBuf, SOI, 0);
      let extracted = 0;
      while (soi !== -1 && fp.queue.length < fp.maxQueue) {
        const eoi = findBytes(fp.streamBuf, EOI, soi + 2);
        if (eoi === -1) break;

        fp.queue.push(fp.streamBuf.slice(soi, eoi + 2));
        fp.streamBuf = fp.streamBuf.slice(eoi + 2);
        extracted++;

        soi = findBytes(fp.streamBuf, SOI, 0);
      }

      if (fp.streamDone && extracted === 0 && soi === -1) break;

      if (fp.streamBuf.length > 65536) {
        fp.streamBuf = fp.streamBuf.slice(-16384);
      }
    }
  } finally {
    fp.fetching = false;
  }

  // 队列有帧且还没开始播放 → 自动播放
  if (fp.queue.length > 0 && !fp.playing) {
    fp.playing = true;
    $('#playIcon').style.display = 'none';
    $('#pauseIcon').style.display = 'block';
    frameTick();
  }
}

function finishPlayback() {
  fp.playing = false;
  $('#playIcon').style.display = 'block';
  $('#pauseIcon').style.display = 'none';

  // 平滑过渡到 100%，避免进度条从中间突然跳到最后
  const startVal = parseFloat($('#seekBar').value) || 0;
  const startFrame = fp.frameIndex;
  const total = fp.totalFrames || startFrame;
  const duration = 600; // ms
  const t0 = performance.now();

  function step(now) {
    const elapsed = now - t0;
    const p = Math.min(elapsed / duration, 1);
    // ease-out cubic
    const ease = 1 - Math.pow(1 - p, 3);

    const cur = Math.round(startFrame + (total - startFrame) * ease);
    $('#seekBar').value = Math.min(startVal + (100 - startVal) * ease, 100);
    const curSec = fp.fps > 0 ? cur / fp.fps : 0;
    const totalSec = fp.fps > 0 ? total / fp.fps : 0;
    $('#timeDisplay').textContent = fmt(curSec) + ' / ' + fmt(totalSec);
    $('#playerFrameInfo').textContent = `帧 ${cur} / ${total}`;

    if (p < 1) {
      requestAnimationFrame(step);
    } else {
      fp.frameIndex = total;
      $('#seekBar').value = 100;
      $('#playerFrameInfo').textContent = `播放完毕`;
    }
  }
  requestAnimationFrame(step);
}

// 播放一帧
async function frameTick() {
  if (!fp.playing) return;

  if (fp.queue.length === 0) {
    if (fp.streamDone) {
      finishPlayback();
      return;
    }
    fp.timer = setTimeout(frameTick, 30);
    return;
  }

  const jpegBytes = fp.queue.shift();
  fp.frameIndex++;
  updateFrameUI();

  // 解码并绘制（失败则跳过此帧）
  try {
    const bmp = await createImageBitmap(new Blob([jpegBytes], { type: 'image/jpeg' }));
    drawBitmap(bmp);
    bmp.close();
  } catch(e) {}

  // 队列有空位 → 补帧
  if (fp.queue.length < fp.maxQueue && !fp.fetching) fillQueue();

  const interval = Math.round(1000 / fp.fps);
  fp.timer = setTimeout(frameTick, interval);
}

function drawBitmap(bmp) {
  const c = $('#previewCanvas');
  c.width = bmp.width;
  c.height = bmp.height;
  c.getContext('2d').drawImage(bmp, 0, 0);
}

function updateFrameUI() {
  const cur = fp.frameIndex;
  const total = fp.totalFrames;
  const fps = fp.fps;
  $('#seekBar').value = total > 0 ? Math.min((cur / total) * 100, 100) : 0;
  const curSec = fps > 0 ? cur / fps : 0;
  const totalSec = fps > 0 ? total / fps : 0;
  $('#timeDisplay').textContent = fmt(curSec) + ' / ' + fmt(totalSec);
  $('#playerFrameInfo').textContent = `帧 ${cur} / ${total}`;
}

function clearQueue() {
  fp.queue = [];
}

function stopVideoPlayback() {
  fp.playing = false;
  if (fp.timer) { clearTimeout(fp.timer); fp.timer = null; }
  if (fp.aborter) { fp.aborter.abort(); fp.aborter = null; }
  fp.reader = null;
  fp.filename = null;
  fp.totalFrames = 0;
  clearQueue();
  fp.streamBuf = new Uint8Array(0);
  $('#playIcon').style.display = 'block';
  $('#pauseIcon').style.display = 'none';
}

$('#playBtn').addEventListener('click', () => {
  if (!fp.filename) return;
  if (fp.playing) {
    // 暂停
    fp.playing = false;
    if (fp.timer) { clearTimeout(fp.timer); fp.timer = null; }
    $('#playIcon').style.display = 'block';
    $('#pauseIcon').style.display = 'none';
  } else {
    // 继续播放
    fp.playing = true;
    $('#playIcon').style.display = 'none';
    $('#pauseIcon').style.display = 'block';
    frameTick();
  }
});

$('#seekBar').addEventListener('input', () => {
  if (!fp.filename || fp.totalFrames <= 0) return;
  const pct = parseFloat($('#seekBar').value);
  const target = Math.round((pct / 100) * (fp.totalFrames - 1));
  // 重启流到目标帧
  startStream(fp.filename, target);
});

function fmt(s) { if(isNaN(s)) return '0:00'; const m=Math.floor(s/60); return m+':'+String(Math.floor(s%60)).padStart(2,'0'); }

function finishUI() { $('#startBtn').disabled = false; $('#btnText').textContent = '开始检测'; $('#btnSpinner').style.display = 'none'; }
function setStatus(state, text) {
  const dot = $('#statusDot');
  const c = { processing: ['var(--yellow)','0 0 6px var(--yellow)'], done: ['var(--green)','0 0 6px var(--green)'], error: ['var(--red)','0 0 6px var(--red)'] };
  const [bg, sh] = c[state] || c.done;
  dot.style.background = bg; dot.style.boxShadow = sh;
  $('#statusText').textContent = text;
}

// ===== Outputs =====
async function loadOutputs() {
  const r = await fetch('/api/outputs'); const d = await r.json();
  if (!d.files.length) { $('#outputList').innerHTML=''; $('#emptyOutputs').style.display='block'; return; }
  $('#emptyOutputs').style.display='none';
  $('#outputList').innerHTML = d.files.map(f => {
    const isVideo = ['mp4','mov','avi','mkv','webm'].includes(f.ext);
    const icon = isVideo
      ? '<svg viewBox="0 0 24 24"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>'
      : '<svg viewBox="0 0 24 24"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"/><circle cx="8.5" cy="8.5" r="1.5"/><path d="M21 15l-5-5L5 21"/></svg>';
    const safe = f.name.replace(/'/g, "\\'");
    return `<div class="output-item">
      <div class="output-icon">${icon}</div>
      <div class="output-meta">
        <div class="output-name" onclick="previewOutput('${safe}')" title="点击预览">${f.name}</div>
        <div class="output-size">${f.size} MB</div>
      </div>
      <div class="output-actions">
        <button class="out-btn" onclick="previewOutput('${safe}')" title="预览">
          <svg viewBox="0 0 24 24"><polygon points="5 3 19 12 5 21 5 3"/></svg>
        </button>
        <a class="out-btn" href="/api/download/${encodeURIComponent(f.name)}" download title="下载"><svg viewBox="0 0 24 24"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4M7 10l5 5 5-5M12 15V3" stroke-linecap="round" stroke-linejoin="round"/></svg></a>
        <button class="out-btn del" onclick="delFile('${safe}')" title="删除"><svg viewBox="0 0 24 24"><path d="M3 6h18M19 6v14a2 2 0 01-2 2H7a2 2 0 01-2-2V6m3 0V4a2 2 0 012-2h4a2 2 0 012 2v2" stroke-linecap="round" stroke-linejoin="round"/></svg></button>
      </div>
    </div>`;
  }).join('');
}

function previewOutput(name) {
  const ext = name.split('.').pop().toLowerCase();
  showOutputFile(name, ['mp4','mov','avi','mkv','webm'].includes(ext) ? 'video' : 'image', null);
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function delFile(n) { if(!confirm('删除 '+n+' ?'))return; await fetch('/api/delete/'+encodeURIComponent(n),{method:'DELETE'}); loadOutputs(); toast('已删除'); }
$('#refreshBtn').addEventListener('click', loadOutputs);
$('#openFolderBtn').addEventListener('click', async () => {
  try { const r = await fetch('/api/open-folder', { method: 'POST' }); const d = await r.json(); if (!d.ok) toast(d.error || '打开失败', true); }
  catch(e) { toast('打开失败: ' + e.message, true); }
});

loadOutputs();
</script>
</body>
